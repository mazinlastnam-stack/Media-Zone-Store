<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تريند للأناقة | الرئيسية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* الألوان والخطوط الأساسية */
        :root {
            --trend-orange: #F18F35;
            --trend-gold: #EAB308;
            --trend-gradient: linear-gradient(90deg, #F18F35 0%, #EAB308 100%);
        }

        * {
            font-family: 'Tajawal', sans-serif;
            padding: 0;
            margin: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
        }

        .brand-font {
            font-family: 'Playfair Display', serif;
        }

        .text-trend-orange { color: var(--trend-orange); }
        .text-trend-gold { color: var(--trend-gold); }
        .border-trend-orange { border-color: var(--trend-orange); }
        
        .trend-gradient {
            background: var(--trend-gradient);
        }

        .text-gradient {
            background: var(--trend-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-main {
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 700;
            transition: opacity 0.3s ease;
        }

        .btn-shop {
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-weight: 700;
        }

        .nav-link {
            transition: color 0.3s ease;
        }
        .nav-link:hover {
            color: var(--trend-orange);
        }

        .hero-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16rem;
            height: 16rem;
            background-color: var(--trend-orange);
            opacity: 0.05;
            filter: blur(120px);
        }

        .product-card {
            position: relative;
            aspect-ratio: 3/4;
            background-color: #f3f4f6;
            border-radius: 1rem;
            overflow: hidden;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
        }

        .product-card .overlay {
            position: absolute;
            inset: 0;
            background-color: black;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .group:hover .overlay {
            opacity: 0.1;
        }

        .cart-btn-wrapper {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            transform: translateY(3rem);
            transition: transform 0.3s ease;
        }

        .group:hover .cart-btn-wrapper {
            transform: translateY(0);
        }

        .cart-btn {
            background-color: white;
            padding: 0.75rem;
            border-radius: 9999px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .cart-btn:hover {
            color: var(--trend-orange);
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .login-modal {
            background: white;
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .login-modal input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Tajawal', sans-serif;
        }
        .error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
        }

        /* Cart Sidebar Styles */
        .cart-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: white;
            z-index: 1100;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.open {
            transform: translateX(0);
        }
        .cart-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f1f5f9;
        }
        .cart-item-image {
            width: 80px;
            height: 80px;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .cart-item-details {
            flex: 1;
        }
        .cart-item-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .cart-item-price {
            color: var(--trend-gold);
            font-weight: bold;
        }
        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }
        .quantity-btn {
            background: #f1f5f9;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .quantity-btn:hover {
            background: var(--trend-orange);
            color: white;
        }
        .remove-item {
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
        }
        .cart-footer {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            background: white;
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .checkout-btn {
            width: 100%;
            padding: 12px;
            background: var(--trend-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .checkout-btn:hover {
            opacity: 0.9;
        }
        .cart-count {
            background: var(--trend-orange);
            color: white;
            border-radius: 9999px;
            padding: 2px 8px;
            font-size: 12px;
            margin-right: 5px;
        }
        .overlay-dark {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1050;
            display: none;
        }
        .overlay-dark.show {
            display: block;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b-2 border-trend-orange">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold brand-font tracking-tight">
                <span class="text-trend-orange">TREND</span><span class="text-trend-gold">ELEGANCE</span>
            </h1>
            <div class="hidden md:flex space-x-reverse space-x-8 font-medium">
                <a href="#" class="nav-link">الرئيسية</a>
                <a href="#" class="nav-link">الأقسام</a>
                <a href="#" class="nav-link">من نحن</a>
            </div>
            <div class="flex items-center space-x-reverse space-x-4">
                <button onclick="toggleCart()" class="relative">
                    <i class="fa-solid fa-bag-shopping text-xl"></i>
                    <span id="cart-count-badge" class="cart-count hidden">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3 class="text-xl font-bold">سلة التسوق</h3>
            <button onclick="toggleCart()" class="text-gray-500 hover:text-black">
                <i class="fa-solid fa-xmark text-2xl"></i>
            </button>
        </div>
        <div id="cart-items-container" class="cart-items">
            <!-- Cart items will be inserted here -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>الإجمالي:</span>
                <span id="cart-total">0 SDG</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">إتمام الطلب</button>
        </div>
    </div>
    <div id="overlay-dark" class="overlay-dark" onclick="toggleCart()"></div>

    <header class="py-24 text-center bg-white relative overflow-hidden">
        <div class="hero-glow"></div>
        <h2 class="text-5xl md:text-6xl font-extrabold mb-6 leading-tight">
            اكتشف مفهوم <span class="text-gradient font-black">الأناقة</span> الحقيقي
        </h2>
        <p class="text-gray-500 max-w-2xl mx-auto text-lg leading-relaxed px-4">
            تشكيلة مختارة بعناية لتناسب ذوقك الرفيع، حيث تلتقي البساطة بالفخامة لتصنع حضورك الطاغي.
        </p>
        <div class="mt-10">
            <a href="#shop" class="trend-gradient btn-shop shadow-xl hover:scale-105 transition-transform inline-block">
                تسوق التشكيلة الجديدة
            </a>
        </div>
    </header>

    <main id="shop" class="max-w-7xl mx-auto px-4 py-16">
        <div class="flex justify-between items-end mb-12">
            <div>
                <span class="text-trend-orange font-bold tracking-widest text-sm uppercase">TRENDING NOW</span>
                <h3 class="text-3xl font-bold mt-2">أحدث المعروضات</h3>
            </div>
            <a href="#" class="text-gray-400 hover:text-black border-b border-gray-200 pb-1 transition">مشاهدة الكل</a>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10" id="products-container">
            <!-- المنتجات ستظهر هنا ديناميكياً -->
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h4 class="brand-font text-2xl mb-4 text-trend-orange">TREND ELEGANCE</h4>
            <p class="text-gray-500 text-sm italic">"أناقتك، هي التريند"</p>
        </div>
    </footer>

    <script>
        // Initialize default products if not exists
        function initData() {
            if (!localStorage.getItem('products')) {
                const defaultProducts = [
                    { id: 1, name: 'قميص قطني كلاسيك', price: 250, stock: 45, category: 'رجالي', sales: 120, image: 'https://picsum.photos/id/20/300/400' },
                    { id: 2, name: 'بنطلون جينز عصري', price: 380, stock: 32, category: 'رجالي', sales: 85, image: 'https://picsum.photos/id/26/300/400' },
                    { id: 3, name: 'فستان سهرة أنيق', price: 550, stock: 18, category: 'نسائي', sales: 42, image: 'https://picsum.photos/id/30/300/400' },
                    { id: 4, name: 'حذاء جلدي فاخر', price: 420, stock: 27, category: 'أحذية', sales: 63, image: 'https://picsum.photos/id/21/300/400' }
                ];
                localStorage.setItem('products', JSON.stringify(defaultProducts));
            }
            if (!localStorage.getItem('orders')) {
                const defaultOrders = [
                    { id: '#TR-9901', customer: 'فاطمة الزهراء', date: '2026-03-25', status: 'مكتمل', total: 1250 },
                    { id: '#TR-9902', customer: 'أحمد محمد', date: '2026-03-25', status: 'قيد التجهيز', total: 850 },
                    { id: '#TR-9903', customer: 'سارة علي', date: '2026-03-24', status: 'مكتمل', total: 2300 }
                ];
                localStorage.setItem('orders', JSON.stringify(defaultOrders));
            }
            if (!localStorage.getItem('stats')) {
                localStorage.setItem('stats', JSON.stringify({
                    totalSales: 45600,
                    todayOrders: 12,
                    newCustomers: 84,
                    currentStock: 342
                }));
            }
            if (!localStorage.getItem('cart')) {
                localStorage.setItem('cart', JSON.stringify([]));
            }
        }
        
        // Cart functions
        function getCart() {
            return JSON.parse(localStorage.getItem('cart')) || [];
        }
        
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
        }
        
        function updateCartUI() {
            const cart = getCart();
            const container = document.getElementById('cart-items-container');
            const totalSpan = document.getElementById('cart-total');
            const badge = document.getElementById('cart-count-badge');
            
            if (!container) return;
            
            if (cart.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-8">سلة التسوق فارغة</div>';
                totalSpan.innerText = '0 SDG';
                badge.classList.add('hidden');
                return;
            }
            
            const products = JSON.parse(localStorage.getItem('products')) || [];
            let total = 0;
            container.innerHTML = '';
            
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (!product) return;
                const itemTotal = product.price * item.quantity;
                total += itemTotal;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <div class="cart-item-image" style="background-image: url('${product.image || 'https://picsum.photos/id/1/300/400'}')"></div>
                    <div class="cart-item-details">
                        <div class="cart-item-name">${product.name}</div>
                        <div class="cart-item-price">${product.price} SDG</div>
                        <div class="cart-item-actions">
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                            <span>${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                            <span class="remove-item" onclick="removeFromCart(${item.id})">إزالة</span>
                        </div>
                    </div>
                `;
                container.appendChild(itemDiv);
            });
            
            totalSpan.innerText = `${total} SDG`;
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            badge.innerText = totalItems;
            badge.classList.remove('hidden');
        }
        
        function addToCart(productId) {
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const product = products.find(p => p.id === productId);
            if (!product) {
                alert('المنتج غير موجود');
                return;
            }
            
            let cart = getCart();
            const existingItem = cart.find(item => item.id === productId);
            const newQuantity = existingItem ? existingItem.quantity + 1 : 1;
            
            if (newQuantity > product.stock) {
                alert(`عذراً، الكمية المطلوبة (${newQuantity}) exceed المتوفر (${product.stock})`);
                return;
            }
            
            if (existingItem) {
                existingItem.quantity = newQuantity;
            } else {
                cart.push({ id: productId, quantity: 1 });
            }
            
            saveCart(cart);
            updateCartUI();
            alert('تمت إضافة المنتج إلى السلة');
        }
        
        function updateQuantity(productId, newQuantity) {
            if (newQuantity < 1) {
                removeFromCart(productId);
                return;
            }
            
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            if (newQuantity > product.stock) {
                alert(`لا يمكن زيادة الكمية عن ${product.stock} المتوفرة`);
                return;
            }
            
            let cart = getCart();
            const item = cart.find(i => i.id === productId);
            if (item) {
                item.quantity = newQuantity;
                saveCart(cart);
            }
        }
        
        function removeFromCart(productId) {
            let cart = getCart();
            cart = cart.filter(item => item.id !== productId);
            saveCart(cart);
        }
        
        function checkout() {
            const cart = getCart();
            if (cart.length === 0) {
                alert('السلة فارغة، أضف منتجات أولاً');
                return;
            }
            
            // التحقق من توفر المخزون مرة أخرى قبل إتمام الطلب
            let products = JSON.parse(localStorage.getItem('products')) || [];
            let insufficientStock = false;
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (!product || product.stock < item.quantity) {
                    insufficientStock = true;
                    alert(`المنتج ${product?.name || item.id} غير متوفر بالكمية المطلوبة`);
                }
            });
            if (insufficientStock) return;
            
            // حساب الإجمالي
            let total = 0;
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                total += product.price * item.quantity;
            });
            
            // إنشاء رقم طلب جديد
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const lastOrderId = orders.length > 0 ? parseInt(orders[orders.length-1].id.replace('#TR-', '')) : 9903;
            const newOrderId = `#TR-${lastOrderId + 1}`;
            
            // تاريخ اليوم
            const today = new Date().toISOString().slice(0,10);
            
            // اسم العميل (يمكن تطوير نموذج لاحقاً)
            const customerName = prompt('الرجاء إدخال اسمك لتأكيد الطلب:', 'عميل جديد');
            if (!customerName) return;
            
            // إنشاء الطلب
            const newOrder = {
                id: newOrderId,
                customer: customerName,
                date: today,
                status: 'قيد التجهيز',
                total: total
            };
            orders.push(newOrder);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            // تحديث المخزون والمبيعات
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    product.stock -= item.quantity;
                    product.sales += item.quantity;
                }
            });
            localStorage.setItem('products', JSON.stringify(products));
            
            // تحديث الإحصائيات
            let stats = JSON.parse(localStorage.getItem('stats')) || {};
            stats.totalSales = (stats.totalSales || 0) + total;
            stats.todayOrders = (stats.todayOrders || 0) + 1;
            stats.currentStock = products.reduce((sum, p) => sum + p.stock, 0);
            localStorage.setItem('stats', JSON.stringify(stats));
            
            // مسح السلة
            localStorage.setItem('cart', JSON.stringify([]));
            updateCartUI();
            
            // إعادة عرض المنتجات (لتحديث المخزون)
            displayProducts();
            
            // إغلاق السلة
            toggleCart();
            
            alert(`تم إتمام طلبك بنجاح!\nرقم الطلب: ${newOrderId}\nالإجمالي: ${total} SDG`);
        }
        
        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('overlay-dark');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }
        
        // Product display
        function displayProducts() {
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const container = document.getElementById('products-container');
            if (!container) return;
            
            container.innerHTML = products.map(product => `
                <div class="group cursor-pointer">
                    <div class="product-card" style="background-image: url('${product.image || 'https://picsum.photos/id/1/300/400'}');">
                        <div class="overlay"></div>
                        <div class="cart-btn-wrapper">
                            <button class="cart-btn" onclick="addToCart(${product.id})">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <h4 class="font-bold text-lg group-hover:text-trend-orange transition-colors">${product.name}</h4>
                    <div class="flex justify-between items-center mt-1">
                        <p class="text-trend-gold font-bold">${product.price} SDG</p>
                        <span class="text-xs text-gray-400">${product.category}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function showAdminLogin() {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                window.location.href = 'admin.html';
                return;
            }
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="login-modal">
                    <i class="fa-solid fa-lock text-4xl text-trend-orange mb-4"></i>
                    <h3 class="text-xl font-bold mb-4">دخول المسؤول</h3>
                    <input type="text" id="login-username" placeholder="اسم المستخدم" autocomplete="off">
                    <input type="password" id="login-password" placeholder="كلمة المرور">
                    <div id="login-error" class="error-msg"></div>
                    <button onclick="attemptLogin()" class="trend-gradient btn-main w-full mt-4">تسجيل الدخول</button>
                    <button onclick="closeLoginModal(this)" class="text-gray-500 mt-3 w-full">إلغاء</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            window.attemptLogin = function() {
                const username = document.getElementById('login-username').value.trim();
                const password = document.getElementById('login-password').value;
                
                if (username === 'Mazin Hassan' && password === 'panda@2025') {
                    sessionStorage.setItem('adminLoggedIn', 'true');
                    window.location.href = 'admin.html';
                } else {
                    document.getElementById('login-error').innerText = 'اسم المستخدم أو كلمة المرور غير صحيحة';
                }
            };
        }
        
        function closeLoginModal(btn) {
            btn.closest('.modal-overlay').remove();
        }
        
        // مزامنة فورية مع التغييرات من أي تبويب
        window.addEventListener('storage', function(event) {
            if (event.key === 'products') {
                displayProducts();
                updateCartUI(); // لتحديث الأسعار والمخزون في السلة
            } else if (event.key === 'cart') {
                updateCartUI();
            } else if (event.key === 'orders' || event.key === 'stats') {
                // يمكن تحديث شيء إذا أردت
            }
        });
        
        // Make functions global
        window.showAdminLogin = showAdminLogin;
        window.addToCart = addToCart;
        window.closeLoginModal = closeLoginModal;
        window.attemptLogin = attemptLogin;
        window.toggleCart = toggleCart;
        window.updateQuantity = updateQuantity;
        window.removeFromCart = removeFromCart;
        window.checkout = checkout;
        
        // Initialize and display
        initData();
        displayProducts();
        updateCartUI();
    </script>
</body>
</html>
