<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ترند الأناقة | متجرك للأزياء العصرية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #349FFF;
            --secondary: #1D77C8;
            --black: #1A1A1A;
        }
        * { font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }
        .trend-gradient { background: linear-gradient(90deg, var(--primary), var(--secondary)); }
        .cart-sidebar {
            position: fixed; top: 0; left: 0; width: 100%; max-width: 380px; height: 100%;
            background: white; z-index: 1100; transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .cart-sidebar.open { transform: translateX(0); }
        .overlay-dark { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 1050; display: none; }
        .overlay-dark.show { display: block; }
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: #323232; color: white; padding: 12px 24px; border-radius: 40px; 
            z-index: 2000; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('home')">
                <i class="fa-solid fa-shirt text-2xl" style="color: var(--primary);"></i>
                <h1 class="text-2xl font-black" style="color: var(--black);">ترند الأناقة</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative cursor-pointer" onclick="toggleCart()">
                    <i class="fa-solid fa-bag-shopping text-xl text-gray-700"></i>
                    <span id="cartBadge" class="absolute -top-2 -right-2 bg-blue-500 text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center hidden">0</span>
                </div>
                <div class="cursor-pointer" onclick="logout()">
                    <i class="fa-solid fa-sign-out-alt text-gray-400"></i>
                </div>
            </div>
        </div>
    </nav>

    <main id="app" class="max-w-7xl mx-auto px-4 py-8"></main>

    <div id="cartSidebar" class="cart-sidebar flex flex-col">
        <div class="p-5 border-b flex justify-between items-center">
            <h2 class="text-xl font-black">سلة التسوق</h2>
            <i class="fa-solid fa-xmark text-2xl cursor-pointer hover:text-red-500" onclick="toggleCart()"></i>
        </div>
        <div id="cartItemsList" class="flex-1 overflow-y-auto p-4 space-y-3 text-right"></div>
        <div class="p-5 border-t bg-gray-50">
            <div class="flex justify-between items-center font-bold text-lg mb-4">
                <span>الإجمالي</span>
                <span id="cartTotalAmount">0 ج.س</span>
            </div>
            <button onclick="checkout()" class="w-full trend-gradient text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 transition active:scale-95">إتمام الطلب (واتساب)</button>
        </div>
    </div>
    
    <div id="overlay" class="overlay-dark" onclick="toggleCart()"></div>
    <div id="toast" class="toast"></div>

    <div id="loginModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-[1200]">
        <div class="bg-white rounded-3xl p-8 w-11/12 max-w-md text-center shadow-2xl">
            <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-user-tie text-4xl text-blue-500"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">مرحباً بك في ترند</h2>
            <p class="text-gray-500 mb-6 text-sm">سجل دخولك لبدء التسوق</p>
            <input type="text" id="loginUsername" placeholder="اسمك الكريم" class="w-full border border-gray-100 bg-gray-50 rounded-xl p-4 mb-3 text-right focus:ring-2 focus:ring-blue-400 outline-none">
            <button onclick="handleLogin()" class="w-full trend-gradient text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-100 transition hover:opacity-90">دخول للمتجر</button>
        </div>
    </div>

    <script>
        // ---------- CONFIG ----------
        const WHATSAPP_NUMBER = '249121479594'; 

        // ---------- STATE ----------
        let currentUser = null;   
        let products = [];
        let cart = [];

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#ef4444' : '#1A1A1A';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ---------- DATA ----------
        function loadData() {
            const storedProducts = localStorage.getItem('products_trend');
            if (storedProducts) {
                products = JSON.parse(storedProducts);
            } else {
                products = [
                    { id: 101, name: 'ساعة YILEIQI كلاسيك (جلد)', price: 40000, category: 'ساعات', image: 'https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=400' },
                    { id: 102, name: 'ساعة WEIDI (مقاومة للماء)', price: 40000, category: 'ساعات', image: 'https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3?w=400' },
                    { id: 103, name: 'ساعة Casio (قفل فراشة)', price: 40000, category: 'ساعات', image: 'https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?w=400' }
                ];
                localStorage.setItem('products_trend', JSON.stringify(products));
            }
        }

        // ---------- UI ----------
        function updateCartUI() {
            const container = document.getElementById('cartItemsList');
            const totalSpan = document.getElementById('cartTotalAmount');
            const badge = document.getElementById('cartBadge');
            let total = 0;
            let itemCount = 0;

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400"><i class="fa-solid fa-cart-shopping text-4xl mb-3 opacity-20"></i><p>السلة فارغة</p></div>`;
                badge.classList.add('hidden');
            } else {
                container.innerHTML = cart.map(item => {
                    const p = products.find(prod => prod.id === item.id);
                    if(!p) return '';
                    total += p.price * item.qty;
                    itemCount += item.qty;
                    return `
                        <div class="flex gap-4 bg-white p-3 rounded-2xl border border-gray-100 shadow-sm">
                            <div class="w-20 h-20 rounded-xl bg-cover bg-center" style="background-image: url('${p.image}')"></div>
                            <div class="flex-1">
                                <h4 class="font-bold text-sm">${p.name}</h4>
                                <p class="text-blue-500 font-bold text-xs mt-1">${p.price.toLocaleString()} ج.س</p>
                                <div class="flex justify-between items-center mt-3">
                                    <div class="flex items-center gap-3 bg-gray-50 px-3 py-1 rounded-lg border">
                                        <button onclick="updateCartQty(${p.id}, -1)" class="font-bold">-</button>
                                        <span class="text-xs font-bold">${item.qty}</span>
                                        <button onclick="updateCartQty(${p.id}, 1)" class="font-bold">+</button>
                                    </div>
                                    <button onclick="removeFromCart(${p.id})" class="text-red-400 text-sm"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>
                        </div>`;
                }).join('');
                badge.innerText = itemCount;
                badge.classList.remove('hidden');
            }
            totalSpan.innerText = total.toLocaleString() + ' ج.س';
            localStorage.setItem('cart_trend', JSON.stringify(cart));
        }

        function addToCart(productId) {
            const existing = cart.find(i => i.id === productId);
            if (existing) existing.qty++;
            else cart.push({ id: productId, qty: 1 });
            updateCartUI();
            showToast('تمت الإضافة للسلة');
        }

        function updateCartQty(id, delta) {
            const idx = cart.findIndex(i => i.id === id);
            if (idx !== -1) {
                cart[idx].qty += delta;
                if (cart[idx].qty <= 0) cart.splice(idx, 1);
                updateCartUI();
            }
        }

        function removeFromCart(id) { cart = cart.filter(i => i.id !== id); updateCartUI(); }

        // ---------- CHECKOUT ----------
        function checkout() {
            if (!currentUser) return;
            if (cart.length === 0) return showToast('السلة فارغة', true);
            
            const phone2 = prompt("الرجاء إدخال رقم هاتف احتياطي (اختياري):") || "لا يوجد";
            const address = prompt("الرجاء إدخال مكان الاستلام بالتفصيل (أمدرمان أو الولاية):");
            
            if (!address) return showToast('يجب إدخال عنوان الاستلام', true);

            let total = 0;
            let itemsText = "";
            cart.forEach(item => {
                const p = products.find(pr => pr.id === item.id);
                if(p) {
                    total += p.price * item.qty;
                    itemsText += `• *${p.name}* (الكمية: ${item.qty})\n`;
                }
            });

            const message = `🛍️ *طلب جديد من متجر ترند الأناقة*\n` +
                            `--------------------------\n` +
                            `👤 *بيانات العميل:*\n` +
                            `- الاسم: ${currentUser.username}\n` +
                            `- الرقم 2: ${phone2}\n` +
                            `- مكان الاستلام: ${address}\n\n` +
                            `📦 *المنتجات:*\n${itemsText}\n` +
                            `💰 *الإجمالي:* ${total.toLocaleString()} ج.س\n` +
                            `--------------------------\n` +
                            `يرجى تأكيد الطلب وتجهيز الشحن.`;

            const waUrl = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(message)}`;
            
            window.location.href = waUrl; 
            
            cart = [];
            updateCartUI();
            toggleCart(false);
        }

        function renderHome() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="mb-10 text-center py-12 rounded-[40px] relative overflow-hidden shadow-2xl shadow-blue-100" 
                     style="background: linear-gradient(135deg, #349FFF, #1D77C8);">
                    <div class="absolute -top-10 -right-10 opacity-10 rotate-12"><i class="fa-solid fa-shirt text-[200px] text-white"></i></div>
                    <div class="relative z-10">
                        <h2 class="text-4xl font-black text-white mb-2">ترند الأناقة 2026</h2>
                        <p class="text-blue-50 font-medium italic">تشكيلة الساعات الفاخرة وصلت الآن</p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    ${products.map(p => `
                        <div class="bg-white rounded-[30px] shadow-sm overflow-hidden group border border-gray-100 flex flex-col h-full hover:shadow-xl transition-all duration-300">
                            <div class="h-56 bg-cover bg-center group-hover:scale-105 transition-transform duration-500" style="background-image: url('${p.image}')"></div>
                            <div class="p-5 flex-1 flex flex-col text-right">
                                <span class="text-[10px] bg-blue-50 text-blue-500 font-bold px-3 py-1 rounded-full w-fit mb-2">${p.category}</span>
                                <h3 class="font-bold text-sm h-10 mb-2 leading-tight">${p.name}</h3>
                                <div class="mt-auto">
                                    <p class="text-black font-black text-lg">${p.price.toLocaleString()} <span class="text-xs">ج.س</span></p>
                                    <button onclick="addToCart(${p.id})" class="mt-4 w-full bg-gray-900 text-white py-3 rounded-2xl text-xs font-bold hover:bg-blue-600 transition-colors">أضف للسلة</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
        }

        function navigate(page) { if (page === 'home') renderHome(); }

        function toggleCart(open = null) {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');
            if (open === true) { sidebar.classList.add('open'); overlay.classList.add('show'); }
            else if (open === false) { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
            else { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
        }

        function handleLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            if (username) {
                currentUser = { username };
                document.getElementById('loginModal').style.opacity = '0';
                setTimeout(() => document.getElementById('loginModal').style.display = 'none', 300);
                renderHome();
            } else {
                showToast('لطفاً أخبرنا باسمك', true);
            }
        }

        function logout() { location.reload(); }

        // Initialize
        loadData();
        const savedCart = localStorage.getItem('cart_trend');
        if (savedCart) cart = JSON.parse(savedCart);
        updateCartUI();
        renderHome();
    </script>
</body>
</html>
