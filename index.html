<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لمسة شبابية - أناقتك تميزك</title>
    <!-- Font Awesome 6 (مجاني) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: خط حديث للعربية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f9f9f9;
            color: #1e1e1e;
            line-height: 1.5;
        }

        /* الألوان الأساسية */
        :root {
            --black: #0a0a0a;
            --black-soft: #111111;
            --gold: #D4AF37;
            --gold-dark: #b88c2e;
            --gold-gradient: linear-gradient(135deg, #D4AF37, #F3E5AB);
            --gray-light: #f4f4f4;
            --white: #ffffff;
        }

        /* شريط التنقل (الهيدر) */
        .navbar {
            background-color: var(--black);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 0.8rem;
            color: var(--gold);
            border-right: 1px solid var(--gold);
            padding-right: 12px;
            margin-right: 6px;
            font-weight: 500;
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
        }

        .nav-icons i {
            color: var(--gold);
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-icons i:hover {
            color: white;
        }

        /* زر البحث والسلة (غير وظيفي بالكامل في هذا النموذج) */
        .cart-badge {
            position: relative;
        }

        /* القسم الرئيسي Hero */
        .hero {
            background: linear-gradient(97deg, #0a0a0a 30%, #1a1a1a 100%);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--gold);
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--white);
        }

        .hero h1 span {
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero p {
            color: #ccc;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .hero-icon {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .hero-icon i {
            font-size: 2rem;
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
            padding: 0.7rem;
            border-radius: 50%;
        }

        /* المنتجات */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 0;
            width: 60px;
            height: 3px;
            background: var(--gold);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .product-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background-color: #eee;
            transition: 0.3s;
        }

        .product-info {
            padding: 1.2rem;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .product-price {
            color: var(--gold-dark);
            font-weight: 800;
            font-size: 1.3rem;
            margin: 0.5rem 0;
        }

        .btn-gold {
            background: var(--gold);
            border: none;
            color: var(--black);
            padding: 0.7rem 1rem;
            width: 100%;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-gold:hover {
            background: var(--gold-dark);
            color: white;
            transform: scale(0.98);
        }

        /* أيقونات مميزة */
        .badge-star {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #faf3e0;
            padding: 0.2rem 0.7rem;
            border-radius: 50px;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            color: var(--gold-dark);
        }

        /* تذييل */
        footer {
            background-color: var(--black);
            color: #aaa;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid var(--gold);
        }

        footer .footer-logo {
            font-size: 1.4rem;
            font-weight: 800;
            background: var(--gold-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* استجابة */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .container {
                padding: 1rem;
            }
            .products-grid {
                gap: 1.2rem;
            }
        }

        /* تخصيص الشماعة والنجمة في الشعار (رمز بصري) */
        .logo-icon {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-left: 8px;
        }
        .logo-icon i {
            font-size: 1.3rem;
            color: var(--gold);
        }
    </style>
</head>
<body>

    <!-- الهيدر الأسود مع الشعار والرموز -->
    <div class="navbar">
        <div class="logo-area">
            <div class="logo-icon">
   <!-- رمز الشماعة البديل -->
                <i class="fas fa-crown"></i>
            </div>
            <div class="logo">لَمْسَة شَبَابِيَّة</div>
            <div class="tagline">أناقتك... تميزك</div>
        </div>
        <div class="nav-icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-user"></i>
            <i class="fas fa-shopping-bag"></i>
        </div>
    </div>

    <!-- القسم الترحيبي Hero -->
    <div class="hero">
        <h1>أطلَق <span>أناقتَك</span> <br> مع لمسة شبابية</h1>
        <p>أزياء راقية تعكس تميزك، تشكيلة حصرية لكل الأذواق</p>

    </div>

    <div class="container">
        <h2 class="section-title">أحدث الإطلالات</h2>
        <div class="products-grid" id="productsGrid">
            <!-- المنتجات ستضاف عبر JS أو يدوياً، لكن سنضعها بشكل ثابت لتوضيح الهوية -->
        </div>
    </div>

    <footer>
        <div class="footer-logo">لَمْسَة شَبَابِيَّة</div>
        <p style="margin-top: 10px;">© 2025 جميع الحقوق محفوظة | أناقتك سر تميزك</p>
        <div style="margin-top: 8px;">
            <i class="fab fa-instagram" style="color: var(--gold); margin: 0 6px;"></i>
            <i class="fab fa-twitter" style="color: var(--gold); margin: 0 6px;"></i>
            <i class="fab fa-snapchat" style="color: var(--gold); margin: 0 6px;"></i>
        </div>
    </footer>

    <script>
        // بيانات المنتجات (تعكس الطابع الذهبي والأناقة)
        const products = [
            {
                id: 1,
                name: "بليزر كلاسيك ذهبي",
                price: "٣٤٠ ر.س",
                img: "https://placehold.co/600x800/1e1e1e/D4AF37?text=Blazer",
                badge: "إصدار محدود"
            },
            {
                id: 2,
                name: "قميص كاجوال أسود",
                price: "١٨٠ ر.س",
                img: "https://placehold.co/600x800/111111/D4AF37?text=Shirt",
                badge: "الأكثر مبيعاً"
            },
            {
                id: 3,
                name: "ساعة أنيقة ذهبية",
                price: "٥٥٠ ر.س",
                img: "https://placehold.co/600x800/222222/D4AF37?text=Watch",
                badge: "تميز"
            },
            {
                id: 4,
                name: "حذاء جلد فاخر",
                price: "٤٢٠ ر.س",
                img: "https://placehold.co/600x800/1a1a1a/D4AF37?text=Shoes",
                badge: "جودة عالية"
            }
        ];

        const productsGrid = document.getElementById('productsGrid');

        function renderProducts() {
            productsGrid.innerHTML = '';
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img class="product-img" src="${product.img}" alt="${product.name}">
                    <div class="product-info">
                        <div class="badge-star"><i class="fas fa-star"></i> ${product.badge}</div>
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price}</div>
                        <button class="btn-gold" data-id="${product.id}" data-name="${product.name}">
                            <i class="fas fa-shopping-cart"></i> أضف إلى السلة
                        </button>
                    </div>
                `;
                productsGrid.appendChild(card);
            });

            // إضافة حدث لكل زر
            document.querySelectorAll('.btn-gold').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const productName = btn.getAttribute('data-name');
                    alert(`✨ تم إضافة "${productName}" إلى سلة التسوق بنجاح.`);
                });
            });
        }

        renderProducts();
    </script>
</body>
</html>
