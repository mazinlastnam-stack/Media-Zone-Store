<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم | ترند الأناقة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f9fafb; }
        .admin-gradient { background: linear-gradient(90deg, #1A1A1A, #B8860B); }
    </style>
</head>
<body>

    <div id="adminLogin" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[2000]">
        <div class="bg-white rounded-3xl p-8 w-11/12 max-w-md text-center shadow-2xl">
            <div class="w-20 h-20 admin-gradient rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-lock text-3xl text-white"></i>
            </div>
            <h2 class="text-2xl font-black mb-6">دخول المسؤول</h2>
            <input type="text" id="adminUser" placeholder="اسم المسؤول" class="w-full border border-gray-200 rounded-xl p-4 mb-3 text-right">
            <input type="password" id="adminPass" placeholder="كلمة المرور" class="w-full border border-gray-200 rounded-xl p-4 mb-6 text-right">
            <button onclick="checkAdminAuth()" class="w-full admin-gradient text-white py-4 rounded-xl font-bold hover:opacity-90 transition">تسجيل الدخول</button>
            <p id="errorMsg" class="text-red-500 mt-4 hidden">بيانات الدخول غير صحيحة!</p>
        </div>
    </div>

    <div id="adminDashboard" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-xl font-black"><i class="fa-solid fa-gears ml-2"></i>لوحة إدارة المنتجات</h1>
                <button onclick="location.reload()" class="text-gray-500"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto p-6">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-8">
                <h3 class="font-bold text-lg mb-4 text-gradient">إضافة قطعة جديدة للمتجر</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="pName" placeholder="اسم المنتج (مثلاً: قميص تركي)" class="border rounded-xl p-3 bg-gray-50">
                    <input type="number" id="pPrice" placeholder="السعر (ج.س)" class="border rounded-xl p-3 bg-gray-50">
                    <select id="pCat" class="border rounded-xl p-3 bg-gray-50">
                        <option>ملابس</option><option>أحذية</option><option>إكسسوارات</option>
                    </select>
                    <input type="text" id="pImage" placeholder="رابط صورة المنتج" class="border rounded-xl p-3 bg-gray-50">
                </div>
                <button onclick="addNewProduct()" class="mt-4 w-full admin-gradient text-white py-3 rounded-xl font-bold">نشر المنتج في المتجر</button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-right text-sm">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-4">المنتج</th>
                            <th>السعر</th>
                            <th>الفئة</th>
                            <th class="text-center">إجراء</th>
                        </tr>
                    </thead>
                    <tbody id="productsTable"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const AUTH = { user: "Mazin Hassan", pass: "panda@2025" };
        let products = JSON.parse(localStorage.getItem('products_trend')) || [];

        function checkAdminAuth() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            if(u === AUTH.user && p === AUTH.pass) {
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                renderTable();
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('productsTable');
            tbody.innerHTML = products.map(p => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <img src="${p.image}" class="w-10 h-10 rounded shadow-sm object-cover">
                            <span class="font-bold">${p.name}</span>
                        </div>
                    </td>
                    <td class="font-bold">${p.price.toLocaleString()} ج.س</td>
                    <td><span class="bg-gray-100 px-2 py-1 rounded text-xs">${p.category}</span></td>
                    <td class="text-center">
                        <button onclick="deleteProduct(${p.id})" class="text-red-500 hover:text-red-700 p-2">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function addNewProduct() {
            const name = document.getElementById('pName').value;
            const price = parseInt(document.getElementById('pPrice').value);
            const category = document.getElementById('pCat').value;
            const image = document.getElementById('pImage').value || 'https://via.placeholder.com/400';

            if(!name || !price) return alert("يرجى ملء البيانات الأساسية");

            const newProd = { id: Date.now(), name, price, category, image };
            products.push(newProd);
            localStorage.setItem('products_trend', JSON.stringify(products));
            renderTable();
            alert("تمت إضافة المنتج بنجاح!");
            
            // مسح الحقول
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
        }

        function deleteProduct(id) {
            if(confirm("هل أنت متأكد من حذف هذا المنتج؟")) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('products_trend', JSON.stringify(products));
                renderTable();
            }
        }
    </script>
</body>
</html>
